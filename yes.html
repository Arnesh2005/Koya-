<body>
  <div class="container">
    <div class="tenor-gif-embed" data-postid="253027946666209433" data-share-method="host" data-aspect-ratio="1.37853"
      data-width="100%">
      <a
        href="https://tenor.com/view/mochi-cat-mochi-and-goma-goma-and-peach-mochi-mochi-peach-cat-gif-gif-253027946666209433">Mochi
        Cat GIF</a>
    </div>
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <h1>I knew it! You Love me a lot 😘</h1>
  </div>

  <script src="script.js"></script>
  <script>
    // Audio Logic
    const yesSound = new Audio('Yes.mp3');
    window.addEventListener('load', () => {
      yesSound.play().catch(error => console.log("Autoplay prevented."));
    });
    document.body.addEventListener('click', () => {
      yesSound.play();
    }, { once: true });

    // Photo Scattering Logic
    const myPhotos = ['koya1.png', 'koya2.jpeg', 'koya3.png', 'koya4.png', 'koya5.png'];
    const zones = [[5, 5], [75, 5], [5, 60], [75, 60], [40, 75]];

    function placePhotos() {
      myPhotos.forEach((src, index) => {
        const img = document.createElement("img");
        img.src = src;
        img.classList.add("floating-photo");

        const zone = zones[index % zones.length];
        const offsetX = Math.floor(Math.random() * 5);
        const offsetY = Math.floor(Math.random() * 5);

        img.style.left = (zone[0] + offsetX) + "vw";
        img.style.top = (zone[1] + offsetY) + "vh";
        img.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

        img.addEventListener("mouseenter", function () {
          if (!img.classList.contains("is-drifting")) {
            img.classList.add("is-drifting");
            const speed = (Math.random() * 0.8 + 1.2).toFixed(2);
            img.style.animationDuration = speed + "s";
          }
        });
        document.body.appendChild(img);
      });
    }

    window.addEventListener('load', placePhotos);
  </script>
  
</body>
</html>
